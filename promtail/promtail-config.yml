server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: '/(.*)'
        target_label: container
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
      - source_labels: [__meta_docker_container_log_stream]
        target_label: logstream
    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
            timestamp: time
      - output:
          source: output
      - timestamp:
          source: timestamp
          format: RFC3339Nano
      # Spring Boot 로그 파싱
      - match:
          selector: '{service="highlog-backend"}'    # POC와 다른 부분
          stages:
            - regex:
                expression: '^(?P<timestamp>\S+)\s+(?P<level>\w+)\s+(?P<pid>\d+)\s+---\s+\[(?P<thread>[^\]]+)\]\s+(?P<logger>\S+)\s+:\s+(?P<message>.+)$'
            - labels:
                level:
                logger:
      # FastAPI 로그 파싱
      - match:
          selector: '{service="ai-service"}'         # POC와 다른 부분
          stages:
            - regex:
                expression: '^(?P<timestamp>\S+)\s+(?P<level>INFO|WARNING|ERROR|DEBUG)\s+(?P<message>.+)$'
            - labels:
                level: