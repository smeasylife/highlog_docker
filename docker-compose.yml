version: '3.8'

services:
  # Nginx Reverse Proxy (HTTPS termination)
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: interview-nginx
    ports:
      - "443:443"
    volumes:
      # SSL certificates mount (Let's Encrypt)
      # 인증서 파일이 존재하지 않으면 플레이스홀더가 사용됩니다
      - ./certificates/fullchain.pem:/etc/nginx/certs/fullchain.pem:ro
      - ./certificates/privkey.pem:/etc/nginx/certs/privkey.pem:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - highlog-backend
      - ai-service
    restart: unless-stopped
    networks:
      - app-network

  # PostgreSQL Database with pgvector extension
  postgres:
    image: pgvector/pgvector:pg16
    container_name: interview-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      # 로컬 PostgreSQL 데이터를 마운트 (기존 데이터 유지)
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network  

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: interview-redis
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # HighLog Spring Boot Backend
  highlog-backend:
    build:
      context: ./highLog
      dockerfile: Dockerfile
    container_name: interview-backend
    # No external port exposure - only accessible via nginx
    expose:
      - "8080"
    environment:
      # Database
      SPRING_DATASOURCE_URL: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

      # Redis
      REDIS_HOST: ${REDIS_HOST}
      REDIS_SERVER_PORT: ${REDIS_PORT}

      # AWS S3 / Oracle Object Storage
      SPRING_CLOUD_AWS_CREDENTIALS_ACCESS_KEY: ${AWS_ACCESS_KEY_ID}
      SPRING_CLOUD_AWS_CREDENTIALS_SECRET_KEY: ${AWS_SECRET_ACCESS_KEY}
      SPRING_CLOUD_AWS_REGION_STATIC: ${AWS_REGION}
      SPRING_CLOUD_AWS_S3_BUCKET: ${AWS_S3_BUCKET_NAME}
      S3_ENDPOINT: ${S3_ENDPOINT}

      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_EXPIRATIONS: ${JWT_ACCESS_TOKEN_EXPIRATIONS}
      JWT_REFRESH_TOKEN_EXPIRATIONS: ${JWT_REFRESH_TOKEN_EXPIRATIONS}

      # Email
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}

      # Admin
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}

      # Spring
      SPRING_PROFILES_ACTIVE: prod
      SPRING_JPA_HIBERNATE_DDL_AUTO: none

      # CORS
      cors_allow_origins: ${CORS_ALLOW_ORIGINS}
      cors_allow_credentials: ${CORS_ALLOW_CREDENTIALS}
      cors_allow_headers: ${CORS_ALLOW_HEADERS}
      cors_expose_headers: ${CORS_EXPOSE_HEADERS}
      cors_allow_methods: ${CORS_ALLOW_METHODS}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

  # AI Service (FastAPI + LangGraph)
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: interview-ai-service
    # No external port exposure - only accessible via nginx
    expose:
      - "8000"
    volumes:
      - ./ai-service/google-credentials.json:/app/google-credentials.json:ro
    environment:
      # Database (PostgreSQL + pgvector for LangGraph checkpoints)
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}

      # AWS S3 / Oracle Object Storage
      aws_access_key_id: ${AWS_ACCESS_KEY_ID}
      aws_secret_access_key: ${AWS_SECRET_ACCESS_KEY}
      aws_region: ${AWS_REGION}
      aws_s3_bucket: ${AWS_S3_BUCKET_NAME}
      aws_s3_endpoint: ${S3_ENDPOINT}

      # Google AI
      google_api_key: ${GOOGLE_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS}

      # LangSmith (옵셔너리 트레이싱/디버깅 - 선택사항)
      LANGCHAIN_TRACING_V2: "false"
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT}

      # JWT
      jwt_secret: ${JWT_SECRET}
      jwt_algorithm: ${JWT_ALGORITHM}
      jwt_access_token_expire_minutes: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES}

      # CORS
      cors_origins: ${CORS_ORIGINS}

      # Debug
      DEBUG: ${DEBUG}
      app_name: HighLog AI Service
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network
  
    # ── Prometheus ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    expose:
      - "9090"
    networks:
      - app-network
    restart: unless-stopped

    # ── Grafana ─────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
    expose:
      - "3000"
    depends_on:
      - prometheus
    networks:
      - app-network
    restart: unless-stopped

    # ── Loki ────────────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml
      - loki-data:/loki
    expose:
      - "3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - app-network
    restart: unless-stopped

    # ── Promtail ────────────────────────────────────────────────
  promtail:
    image: grafana/promtail:2.9.0
    container_name: promtail
    user: root
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - app-network
    restart: unless-stopped

    # ── Node Exporter ────────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    expose:
      - "9100"
    networks:
      - app-network
    restart: unless-stopped


volumes:
  postgres_data:
    driver: local
    name: postgres_data
  redis_data:
    driver: local
    name: redis_data
  nginx_logs:
    driver: local
    name: nginx_logs
  grafana-data:
  loki-data:

networks:
  app-network:
    driver: bridge
    name: app-network
